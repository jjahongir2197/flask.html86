<!DOCTYPE html>
<html>
<head>
    <title>Task Manager</title>
</head>
<body>

    <h1>Task Manager</h1>

    <form method="POST">

        <input type="text" name="task" placeholder="Task">
        <select name="priority">
            <option>Low</option>
            <option>Medium</option>
            <option>High</option>
        </select>

        <button>Add</button>

    </form>

    <hr>

    {% for t in tasks %}

        <h3>
            {{ t.task }} - {{ t.priority }}
            {% if t.done %} ✔ {% endif %}
        </h3>

        <a href="/done/{{ loop.index0 }}">Done</a> |
        <a href="/delete/{{ loop.index0 }}">Delete</a>

        <hr>

    {% endfor %}

</body>
</html>
